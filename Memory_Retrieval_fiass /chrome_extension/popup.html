<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>RAG Indexer</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h2>🧠 RAG Indexer</h2>
      <div id="status-indicator" class="status-offline" title="Checking connection...">●</div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="files">Local Files</button>
      <button class="tab-btn" data-tab="sandbox">Sandbox Files</button>
      <button class="tab-btn" data-tab="url">Web URL</button>
      <button class="tab-btn" data-tab="stats">Corpus Stats</button>
    </div>

    <div id="files-tab" class="tab-content active">
      <div class="upload-area" id="drop-zone">
        <p>Drag & drop documents here or</p>
        <input type="file" id="file-input" multiple accept=".txt,.md,.pdf,.csv,.json">
        <label for="file-input" class="btn btn-secondary">Select Files</label>
      </div>
      
      <div id="file-list" class="file-list"></div>
      
      <button id="index-files-btn" class="btn btn-primary" disabled>Index Selected Files</button>
    </div>

    <div id="sandbox-tab" class="tab-content">
      <div class="sandbox-header">
        <span>Files in Server Sandbox:</span>
        <button id="refresh-sandbox-btn" class="btn-icon" title="Refresh files">↻</button>
      </div>
      
      <div id="sandbox-file-list" class="sandbox-file-list"></div>
      
      <button id="index-sandbox-btn" class="btn btn-primary" disabled>Index Selected Files</button>
    </div>

    <div id="url-tab" class="tab-content">
      <div class="input-group">
        <label for="url-input">URL to Index:</label>
        <input type="text" id="url-input" placeholder="https://example.com/article">
      </div>
      <button id="index-url-btn" class="btn btn-primary">Index URL via Crawl4AI</button>
    </div>

    <div id="stats-tab" class="tab-content">
      <div class="stats-box">
        <div class="stat-item">
          <span class="stat-label">Indexed Documents:</span>
          <span class="stat-value" id="stat-docs">-</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Total FAISS Chunks:</span>
          <span class="stat-value" id="stat-chunks">-</span>
        </div>
      </div>
      <button id="refresh-stats-btn" class="btn btn-secondary">Refresh Stats</button>
    </div>

    <div id="message-area" class="message-area"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
